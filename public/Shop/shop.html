<body>
    <!-- <img class="background" src="../assets/forest.jpg"> -->

        </ul>

    <div id="background1">
        <div class="shopMainBox">
  <!-- -------------------- SHOP TOP CONTENT --------------------- -->
            <div id="shopTitle">
                <h1>SHOP</h1>
            </div>


            <!-- search by (filter) container  -->

            <div class="searchByContainer">

                <div class="SearchByTitleContainer">
                    <p class="searchByTitle">SEARCH BY (ONE OPTION PER ROW)</p>
                </div>

                <div class="rowsContainer">
                    <div class="filterRow">
                        <span class="filterLabel">PLANT TYPE</span>
                        
<button class="filterBtn" onclick="setFilter('type', 'indoor' ,this)">INDOOR</button>
<button class="filterBtn" onclick="setFilter('type', 'outdoor' ,this)">OUTDOOR</button>
                    </div>

                    <div class="filterRow">
                        <span class="filterLabel">PRICE</span>
<button class="filterBtn" onclick="setFilter('price', 'high-low' ,this)">HIGH - LOW</button>
<button class="filterBtn" onclick="setFilter('price', 'low-high' ,this)">LOW - HIGH</button>
                    </div>

                    <div class="filterRow">
                        <span class="filterLabel">CARE LEVEL</span>
<button class="filterBtn" onclick="setFilter('care', 'easy' ,this)">EASY</button>
<button class="filterBtn" onclick="setFilter('care', 'medium' ,this)">MEDIUM</button>
<button class="filterBtn" onclick="setFilter('care', 'hard' ,this)">HARD</button>
                    </div>
                </div>
            </div>


            <!------------- SHOP MIDDLE CONTENT (basically the plant cards) ------------------------>
            <main class="shopMiddleContent">
                <div class="cardsContainer" id="cardsContainer">  </div>
         <!-- yess at first look the 'middle content' looks empty but the html code for it is written in the JS file-->

            </main>
        </div>
    </div>

    <!-- The small popup that will show up when the user adds smth to cart -->
<div id="addedMsg" class="addedMsg"> Added to cart!</div>
