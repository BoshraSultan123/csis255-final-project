<!-- - - - - - - - - - - - - - - - -  - - - - M A I N  C O N T A C T  U S  C O N T E N T - - - - - - - - - - - - - - - - - - - - - - - - - -->
        <main>
            <form id="contactForm"> <!-- No action or method specified because of manual routing in contactus.js -->
                <h2 style="background-color: #fcffde; color: #304932; padding: 10px 130px; border-radius: 15px;">Contact Us</h2>
                <div>
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <br>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <br>
                <div>
                    <label for="category">Category:</label>
                    <select id="category" name="category" required>
                        <option value="">-- Choose a category --</option>
                        <option value="general">General Question</option>
                        <option value="order">Order Issue</option>
                        <option value="feedback">Feedback</option>
                        <option value="support">Support</option>
                    </select>
                </div>
                <br>
                <div>
                    <label for="message" >Message:</label>
                    <br>
                    <textarea id="message" name="message" rows="6" cols="40" placeholder="Write your message here..."
                        minlength="10" required></textarea>
                </div>
                <br>
                <div>
                    <button type="submit">Send Message</button>
                    <button type="reset">Clear</button>
                </div>
            </form>
        </main>

<!-- - - - - - - - - - - - - - - - - - - - - - - - F o o t e r c o n t e n t - - - - - - - - - - - - - - - - - - - - - - - - -->
